<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NightDrop - Secure File Upload</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #27272a;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 80%, var(--accent-glow) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.2) 0%, transparent 50%);
            animation: pulse 15s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Auth Container */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .auth-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.875rem 1rem;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            width: 100%;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.75rem;
        }

        .btn-secondary:hover {
            border-color: var(--accent-primary);
            color: var(--text-primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .auth-footer a {
            color: var(--accent-primary);
            text-decoration: none;
            cursor: pointer;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Main App (hidden by default) */
        #mainApp {
            display: none;
        }

        /* Header */
        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(18, 18, 26, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-tertiary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .user-badge::before {
            content: '👤';
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            border-color: var(--error);
            color: var(--error);
            background: rgba(239, 68, 68, 0.1);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Upload Zone */
        .upload-zone {
            background: var(--bg-secondary);
            border: 2px dashed var(--border-color);
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .upload-zone::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(99, 102, 241, 0.05), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .upload-zone:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .upload-zone:hover::before {
            opacity: 1;
        }

        .upload-zone.drag-over {
            border-color: var(--accent-secondary);
            background: rgba(99, 102, 241, 0.1);
            transform: scale(1.02);
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 10px 30px var(--accent-glow);
            transition: transform 0.3s ease;
        }

        .upload-zone:hover .upload-icon {
            transform: translateY(-5px) rotate(5deg);
        }

        .upload-text h2 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .upload-text p {
            color: var(--text-secondary);
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
        }

        .file-input {
            display: none;
        }

        /* File List */
        .file-list {
            display: grid;
            gap: 1rem;
        }

        .file-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
            animation: slideIn 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-item:hover {
            border-color: var(--accent-primary);
            transform: translateX(5px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .file-icon {
            width: 48px;
            height: 48px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.25rem;
        }

        .file-meta {
            font-size: 0.875rem;
            color: var(--text-muted);
            display: flex;
            gap: 1rem;
        }

        .file-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--accent-primary);
        }

        .btn-icon.delete:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--error);
            color: var(--error);
        }

        /* Progress Bar */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            transition: width 0.3s ease;
            border-radius: 0 0 0 16px;
        }

        /* Stats Section */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-primary);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 1000;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-primary);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideInRight 0.4s ease;
            pointer-events: all;
            min-width: 300px;
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--error); }
        .toast.warning { border-left-color: var(--warning); }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Preview Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 24px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-color);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            max-height: 60vh;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .preview-image {
            max-width: 100%;
            border-radius: 12px;
            display: block;
            margin: 0 auto;
        }

        .preview-text {
            background: var(--bg-tertiary);
            padding: 1.5rem;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.6;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .auth-card {
                padding: 2rem 1.5rem;
            }

            header {
                padding: 1rem;
                flex-direction: column;
                gap: 1rem;
            }

            .upload-zone {
                padding: 2rem 1rem;
            }

            .file-item {
                flex-wrap: wrap;
            }

            .file-actions {
                width: 100%;
                justify-content: flex-end;
                margin-top: 0.5rem;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="bg-animation"></div>

    <!-- Authentication Screen -->
    <div id="authScreen" class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">⚡ NightDrop</div>
            <div class="auth-subtitle">Secure client-side file processing</div>

            <div id="errorMsg" class="error-message"></div>

            <form id="authForm" onsubmit="return false;">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter your username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-primary" onclick="handleAuth()">
                    <span id="authBtnText">Sign In</span>
                </button>

                <button type="button" class="btn-secondary" onclick="toggleAuthMode()">
                    <span id="toggleBtnText">Create Account</span>
                </button>
            </form>

            <div class="auth-footer">
                <span id="authFooterText">Don't have an account?</span>
                <a onclick="toggleAuthMode()" id="authFooterLink">Sign up</a>
            </div>
        </div>
    </div>

    <!-- Main Application (Hidden until authenticated) -->
    <div id="mainApp">
        <header>
            <div class="header-left">
                <div class="logo">⚡ NightDrop</div>
                <div class="user-badge" id="currentUser">User</div>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </header>

        <div class="container">
            <!-- Stats -->
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalFiles">0</div>
                    <div class="stat-label">Files Uploaded</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalSize">0 MB</div>
                    <div class="stat-label">Total Size</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="fileTypes">0</div>
                    <div class="stat-label">File Types</div>
                </div>
            </div>

            <!-- Upload Zone -->
            <div class="upload-zone" id="dropZone">
                <input type="file" id="fileInput" class="file-input" multiple accept="*/*">
                <div class="upload-icon">📁</div>
                <div class="upload-text">
                    <h2>Drop files here</h2>
                    <p>or click to browse from your device</p>
                    <button class="btn-primary" style="width: auto; padding: 0.75rem 1.5rem;" onclick="document.getElementById('fileInput').click()">
                        Select Files
                    </button>
                </div>
            </div>

            <!-- File List -->
            <div id="fileList" class="file-list">
                <div class="empty-state">
                    <div class="empty-icon">📂</div>
                    <p>No files uploaded yet. Drop some files to get started!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Preview Modal -->
    <div class="modal" id="previewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">File Preview</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        // Authentication State
        let isLoginMode = true;
        let currentUser = null;
        let files = [];

        // DOM Elements
        const authScreen = document.getElementById('authScreen');
        const mainApp = document.getElementById('mainApp');
        const authBtnText = document.getElementById('authBtnText');
        const toggleBtnText = document.getElementById('toggleBtnText');
        const authFooterText = document.getElementById('authFooterText');
        const authFooterLink = document.getElementById('authFooterLink');
        const errorMsg = document.getElementById('errorMsg');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        // Initialize
        checkExistingSession();

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                authBtnText.textContent = 'Sign In';
                toggleBtnText.textContent = 'Create Account';
                authFooterText.textContent = "Don't have an account?";
                authFooterLink.textContent = 'Sign up';
            } else {
                authBtnText.textContent = 'Create Account';
                toggleBtnText.textContent = 'Sign In Instead';
                authFooterText.textContent = "Already have an account?";
                authFooterLink.textContent = 'Sign in';
            }
            errorMsg.classList.remove('show');
        }

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
            setTimeout(() => errorMsg.classList.remove('show'), 3000);
        }

        function handleAuth() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            if (isLoginMode) {
                login(username, password);
            } else {
                register(username, password);
            }
        }

        function register(username, password) {
            // Check if user exists
            const users = JSON.parse(localStorage.getItem('nightdrop_users') || '{}');

            if (users[username]) {
                showError('Username already exists');
                return;
            }

            // Create new user (Note: In production, never store plain text passwords!)
            users[username] = {
                password: password, // Should be hashed in production
                createdAt: Date.now()
            };

            localStorage.setItem('nightdrop_users', JSON.stringify(users));

            // Auto login after registration
            login(username, password);
            showToast('Account created successfully!', 'success');
        }

        function login(username, password) {
            const users = JSON.parse(localStorage.getItem('nightdrop_users') || '{}');

            if (!users[username] || users[username].password !== password) {
                showError('Invalid username or password');
                return;
            }

            // Set session
            currentUser = username;
            sessionStorage.setItem('nightdrop_current_user', username);

            // Load user files
            loadUserFiles();

            // Show main app
            showMainApp();
            showToast(`Welcome back, ${username}!`, 'success');
        }

        function checkExistingSession() {
            const savedUser = sessionStorage.getItem('nightdrop_current_user');
            if (savedUser) {
                const users = JSON.parse(localStorage.getItem('nightdrop_users') || '{}');
                if (users[savedUser]) {
                    currentUser = savedUser;
                    loadUserFiles();
                    showMainApp();
                }
            }
        }

        function showMainApp() {
            authScreen.style.display = 'none';
            mainApp.style.display = 'block';
            document.getElementById('currentUser').textContent = currentUser;
            document.body.style.overflow = 'auto';

            // Initialize file handlers
            initFileHandlers();
            updateStats();
            renderFiles();
        }

        function logout() {
            currentUser = null;
            files = [];
            sessionStorage.removeItem('nightdrop_current_user');

            authScreen.style.display = 'flex';
            mainApp.style.display = 'none';
            document.body.style.overflow = 'hidden';

            // Clear inputs
            usernameInput.value = '';
            passwordInput.value = '';
            errorMsg.classList.remove('show');

            showToast('Logged out successfully', 'info');
        }

        function loadUserFiles() {
            const allFiles = JSON.parse(localStorage.getItem('nightdrop_files') || '[]');
            files = allFiles.filter(f => f.user === currentUser);
        }

        function saveFiles() {
            const allFiles = JSON.parse(localStorage.getItem('nightdrop_files') || '[]');
            const otherFiles = allFiles.filter(f => f.user !== currentUser);
            const storageData = files.map(f => ({
                ...f,
                content: f.content && f.content.length > 50000 ? null : f.content
            }));
            localStorage.setItem('nightdrop_files', JSON.stringify([...otherFiles, ...storageData]));
        }

        // File Handling Functions
        function initFileHandlers() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            });

            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('drag-over');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                handleFiles(e.dataTransfer.files);
            });

            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
            });
        }

        function handleFiles(fileList) {
            Array.from(fileList).forEach(file => {
                const fileData = {
                    id: Date.now() + Math.random().toString(36).substr(2, 9),
                    name: file.name,
                    size: file.size,
                    type: file.type,
                    lastModified: file.lastModified,
                    content: null,
                    user: currentUser
                };

                const reader = new FileReader();

                if (file.type.startsWith('image/')) {
                    reader.onload = (e) => {
                        fileData.content = e.target.result;
                        addFile(fileData);
                    };
                    reader.readAsDataURL(file);
                } else if (file.size < 1024 * 1024) {
                    reader.onload = (e) => {
                        fileData.content = e.target.result;
                        addFile(fileData);
                    };
                    reader.readAsText(file);
                } else {
                    addFile(fileData);
                }
            });
        }

        function addFile(fileData) {
            files.unshift(fileData);
            saveFiles();
            renderFiles();
            updateStats();
            showToast(`Uploaded ${fileData.name}`, 'success');
        }

        function removeFile(id) {
            files = files.filter(f => f.id !== id);
            saveFiles();
            renderFiles();
            updateStats();
            showToast('File removed', 'warning');
        }

        function renderFiles() {
            const fileList = document.getElementById('fileList');

            if (files.length === 0) {
                fileList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📂</div>
                        <p>No files uploaded yet. Drop some files to get started!</p>
                    </div>
                `;
                return;
            }

            fileList.innerHTML = files.map(file => `
                <div class="file-item" data-id="${file.id}">
                    <div class="file-icon">${getFileIcon(file.type)}</div>
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(file.name)}</div>
                        <div class="file-meta">
                            <span>${formatSize(file.size)}</span>
                            <span>•</span>
                            <span>${new Date(file.lastModified).toLocaleDateString()}</span>
                            <span>•</span>
                            <span>${file.type || 'Unknown'}</span>
                        </div>
                    </div>
                    <div class="file-actions">
                        ${file.content ? `
                            <button class="btn-icon" onclick="previewFile('${file.id}')" title="Preview">
                                👁️
                            </button>
                        ` : ''}
                        <button class="btn-icon" onclick="downloadFile('${file.id}')" title="Download">
                            ⬇️
                        </button>
                        <button class="btn-icon delete" onclick="removeFile('${file.id}')" title="Delete">
                            🗑️
                        </button>
                    </div>
                    <div class="progress-bar" style="width: 100%"></div>
                </div>
            `).join('');
        }

        function getFileIcon(type) {
            if (type.startsWith('image/')) return '🖼️';
            if (type.startsWith('video/')) return '🎬';
            if (type.startsWith('audio/')) return '🎵';
            if (type.includes('pdf')) return '📄';
            if (type.includes('zip') || type.includes('rar')) return '📦';
            if (type.includes('code') || type.includes('javascript') || type.includes('html')) return '💻';
            return '📄';
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function updateStats() {
            document.getElementById('totalFiles').textContent = files.length;
            const totalBytes = files.reduce((acc, file) => acc + file.size, 0);
            document.getElementById('totalSize').textContent = formatSize(totalBytes);
            const types = new Set(files.map(f => f.type.split('/')[0]).filter(Boolean));
            document.getElementById('fileTypes').textContent = types.size;
        }

        function previewFile(id) {
            const file = files.find(f => f.id === id);
            if (!file || !file.content) return;

            document.getElementById('modalTitle').textContent = file.name;
            const modalBody = document.getElementById('modalBody');

            if (file.type.startsWith('image/')) {
                modalBody.innerHTML = `<img src="${file.content}" class="preview-image" alt="${file.name}">`;
            } else {
                modalBody.innerHTML = `<pre class="preview-text">${escapeHtml(file.content)}</pre>`;
            }

            document.getElementById('previewModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('previewModal').classList.remove('active');
        }

        function downloadFile(id) {
            const file = files.find(f => f.id === id);
            if (!file) return;

            const link = document.createElement('a');
            link.download = file.name;

            if (file.content) {
                link.href = file.content;
            } else {
                const blob = new Blob(['This is a demo file. In a real implementation, this would download the actual file content.'], { type: 'text/plain' });
                link.href = URL.createObjectURL(blob);
            }

            link.click();
            showToast(`Downloading ${file.name}`, 'success');
        }

        function showToast(message, type = 'info') {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };

            toast.innerHTML = `
                <span>${icons[type] || 'ℹ️'}</span>
                <span>${message}</span>
            `;

            toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal on outside click
        document.getElementById('previewModal').addEventListener('click', (e) => {
            if (e.target.id === 'previewModal') closeModal();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
            if (e.ctrlKey && e.key === 'o' && mainApp.style.display === 'block') {
                e.preventDefault();
                document.getElementById('fileInput').click();
            }
            if (e.key === 'Enter' && authScreen.style.display !== 'none') {
                handleAuth();
            }
        });
    </script>
</body>
</html>
